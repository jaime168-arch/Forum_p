<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Chavinho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-image: url(assets/Fundo1Chaves.png);background-size: cover;">

    <div class="container d-flex justify-content-center align-itens-center vh-100">
        <div class="card p-4" style="width: 300px;">
            <h3 class="text-center">Login Chaves</h3>

            <input type="text" id="usuario" class="form-control mb-2" placeholder="usuário">
            <input type="password" id="senha" class="form-control mb-2" placeholder="Senha">

            <button class="btn btn-success w-100" onclick="login()">Entrar</button>

            <p id="erro" class="text-danger mt-2 text-center"></p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>


</html>
